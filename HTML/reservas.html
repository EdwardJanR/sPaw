<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../CSS/navFooter.css">
    <link rel="stylesheet" href="../CSS/reservas.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <title>Reservas</title>
</head>

<body>
    <header>
        <nav class="navbar navbar-expand-lg menu">
            <div class="container-fluid d-flex align-items-center">
                <a class="navbar-brand d-flex align-items-center" href="../index.html">
                    <img class="logo" src="../IMG/logo-row-02.png" alt="logo-sPaw">
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav ms-auto mb-2 mb-lg-0 gap-4 pe-2">
                        <li class="nav-item">
                            <a class="nav-link" href="../index.html">Inicio</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="./quienesSomos.html">Quienes somos</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="./servicios.html">Servicios</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="./contactenos.html">Contáctanos</a>
                        </li>
                    </ul>
                    <button class="boton-login">Perfil Usuario</button>
                </div>
            </div>
        </nav>
    </header>
    <main>
        <form action="/procesar-formulario" method="post">
            <!-- Campos del formulario -->
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre" placeholder="Tu nombre completo">
            <br><br>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="ejemplo@dominio.com">
            <br><br>

            <label for="mensaje">Mensaje:</label>
            <textarea id="mensaje" name="mensaje" rows="4" cols="50"></textarea>
            <br><br>

            <button type="submit">Enviar</button>
        </form>
        <div id="servicio-reservado"></div>
    </main>
    <footer class="footer-custom py-5">
        <div class="container">
            <div class="row align-items-center justify-content-between">
                <!-- Logo -->
                <div class="col-md-4 d-flex justify-content-center justify-content-md-start mb-4 mb-md-0">
                    <img src="../IMG/logo-03.png" class="footer-logo" alt="Logo sPaw">
                </div>
                <!-- Información  -->
                <div class="col-md-8">
                    <div class="row g-4 align-items-start">
                        <!-- Correo -->
                        <div class="col-12 col-md-5">
                            <div class="info-item d-flex gap-3 mb-3">
                                <i class="bi bi-envelope-fill info-icon"></i>
                                <div>
                                    <h6 class="info-title">Correo</h6>
                                    <p class="info-text mb-0">sPaw@gmail.com</p>
                                </div>
                            </div>
                            <!-- Teléfono -->
                            <div class="info-item d-flex gap-3">
                                <i class="bi bi-telephone-fill info-icon"></i>
                                <div>
                                    <h6 class="info-title">Teléfono</h6>
                                    <p class="info-text mb-0">+57 3485784413</p>
                                </div>
                            </div>
                        </div>
                        <!-- Horarios -->
                        <div class="col-12 col-md-5">
                            <div class="info-item d-flex gap-3 mb-3">
                                <i class="bi bi-clock-fill info-icon"></i>
                                <div>
                                    <h6 class="info-title">Horarios</h6>
                                    <p class="info-text mb-0">Lun-Dom: 9:30AM - 6:30PM</p>
                                </div>
                            </div>
                            <!-- Dirección -->
                            <div class="info-item d-flex gap-3">
                                <i class="bi bi-geo-alt-fill info-icon"></i>
                                <div>
                                    <h6 class="info-title">Dirección</h6>
                                    <p class="info-text mb-0">Cra 21 #112 - 36, Bogotá, Colombia</p>
                                </div>
                            </div>
                        </div>
                        <!-- Redes -->
                        <div class="col-12 col-md-2 d-flex justify-content-center justify-content-md-end">
                            <div class="social-icons d-flex gap-3">
                                <i class="bi bi-whatsapp"></i>
                                <i class="bi bi-instagram"></i>
                                <i class="bi bi-facebook"></i>
                                <i class="bi bi-envelope-fill"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </footer>
    <div class="footer-copy text-center py-2">
        ©2025 sPaw. Todos los derechos reservados
    </div>
    <script src="../JS/reservas.js"></script>
</body>

</html>
