    <main>








































      
    <section class="contacto">
        <div class="container  mt-5">
            <h2 class="text-center mb-5 section-title" id="Contacto">Contáctanos</h2>
        </div>
        <div class="container mt-5 contacto">
            <div class="row cont-row">          
                <div class="col-md-6 col-sm-12">
                    <!-- Formulario de ayuda-->
                    <h3 class="subtitulo">¿Necesitas ayuda?</h3>
                    
                    <form class="row g-3 validacion" novalidate action="https://formspree.io/f/xpwebqvb" method="POST">
                        <div class="col-md-4">
                            <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="nombre" name="nombre" placeholder="Tu nombre" required>
                            <label for="nombre" class="form-label">Nombre</label>
                        </div>  
                        </div>
                        <div class="col-md-4">
                            <div class="form-floating mb-3">
                            <input type="apellido" class="form-control" id="apellido" name="apellido" placeholder="Tu apellido" required>
                            <label for="apellido" class="form-label">Apellido</label>
                        </div>
                        </div>
                        <div class="col-md-4">
                            <div class="form-floating mb-3">
                            <div class="form-floating mb-3">
                            <input type="tel" class="form-control" id="telefono" name="telefono" placeholder="Tu teléfono" required>
                           <label for="telefono" class="form-label">Teléfono</label>                         
                        </div>
                        </div>
                        </div>
                        <div class="col-md-4">
                            <div class="form-floating mb-">                           
                            <input type="email" class="form-control" id="e-mail" name="e-mail" placeholder="Tu e-mail" required>
                            <label for="e-mail" class="form-label">e-mail</label>
                        </div>
                        </div>
                        <div class="col-md-4">
                            <div class="form-floating mb-3">
                            <textarea class="form-control" name="mensaje" placeholder="Tu mensaje" required></textarea>    
                            <label for="mensaje" class="form-label">Mensaje</label>                                                 
                        </div>  
                        </div>
                    <div>
                        <button type="submit" class="btn-contact">Enviar</button>
                    </div>  
                    <div class="imagen-contacto">
                        <img src="../IMG/spaw10.png" alt="">
                    </div>
                </div>
            </div>
        </div>
    </section>

    </main>

                            </div>
                        </div>
                        <!-- Horarios -->

                                <div>

                            </div>
                        </div>
                        <!-- Teléfono -->

                                    <p class="info-text mb-0">+57 3485784413</p>
                                </div>
                            </div>
                        </div>
                        <!-- Dirección -->
