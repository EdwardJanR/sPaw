    <header>
        <nav class="navbar navbar-expand-lg menu">
            <div class="container-fluid d-flex align-items-center">
                <a class="navbar-brand d-flex align-items-center" href="../index.html">
                    <img class="logo" src="../IMG/logo-row-02.png" alt="logo-sPaw">
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">

                        </li>
                    </ul>
                    <a class="boton-login">Usuario</a>
                </div>
            </div>
        </nav>
    </header>
    <main>
        <section class="registro">
            <div class="container-registro container w-75 my-5 rounded-4">
                <form id="formRegistro" class="formulario-registro my-4">
                    <p class="titulo text-center mb-3">Registro de Usuario</p>
                    <div class="d-flex justify-content-around">
                        <div class="column-form d-flex flex-column w-50 m-3">
                            <div class="form-floating ">
                                <input type="text" class="form-control entrada" id="nombreUsuario" placeholder="">
                                <label for="nombreUsuario">Ingrese nombre</label>
                            </div>
                            <div class="form-floating ">
                                <input type="text" class="form-control entrada" id="telefonoUsuario" placeholder="">
                                <label for="telefonoUsuario">Ingrese teléfono</label>
                            </div>
                            <div class="form-floating ">
                                <input type="password" class="form-control entrada" id="contrasenaUsuario" 
                                placeholder="">
                                <label for="contrasenaUsuario">Ingrese contraseña</label>
                            </div>
                            <div class="form-floating ">
                                <input type="text" class="form-control entrada" id="mascota1Usuario" 
                                placeholder="">
                                <label for="mascota1Usuario">Ingrese nombre de mascota</label>
                            </div>
                            <div class="form-floating ">
                                <input type="text" class="form-control entrada" id="mascota3Usuario"
                                placeholder="">
                                <label for="mascota3Usuario">Ingrese nombre de mascota</label>
                            </div>
                        </div>
                        <div class="column-form d-flex flex-column w-50 m-3">
                            <div class=" form-floating">
                                <input type="text" class="form-control entrada" id="apellidosUsuario"
                                placeholder="">
                                <label for="apellidosUsuario">Ingrese Apellidos</label>
                            </div>
                            <div class=" form-floating">
                                <input type="email" class="form-control entrada" id="correoUsuario" 
                                placeholder="">
                                <label for="correoUsuario">Ingrese correo</label>
                            </div>
                            <div class=" form-floating">
                                <input type="password" class="form-control entrada" id="confirmarContraUsuario"
                                placeholder="">
                                <label for="confirmarContraUsuario">Confirmar contraseña</label>
                            </div>
                            <div class=" form-floating">
                                <input type="text" class="form-control entrada" id="mascota2Usuario"
                                placeholder="">
                                <label for="mascota2Usuario">Ingrese nombre de mascota</label>
                            </div>
                            <div class=" form-floating">
                                <input type="text" class="form-control entrada" id="mascota4Usuario"
                                placeholder="">
                                <label for="mascota4Usuario">Ingrese nombre de mascota</label>
                            </div>
                        </div>
                    </div>
                    <div class="form-floating d-flex justify-content-center">
                        <button type="button" onclick="validaciones()" class="boton-login">Enviar</button>
                    </div>

                </form>
            </div>
        </section>
        <footer class="footer-custom py-5">
            <div class="container">
                <div class="row align-items-center justify-content-between">
                    <!-- Logo -->
                    <div class="col-md-4 d-flex justify-content-center justify-content-md-start mb-4 mb-md-0">
                        <img src="../IMG/logo-03.png" class="footer-logo" alt="Logo sPaw">
                    </div>
                    <!-- Información  -->
                    <div class="col-md-8">
                        <div class="row g-4 align-items-start">
                            <!-- Correo -->
                            <div class="col-12 col-md-5">
                                <div class="info-item d-flex gap-3 mb-3">
                                    <i class="bi bi-envelope-fill info-icon"></i>
                                    <div>
                                        <h6 class="info-title">Correo</h6>
                                        <p class="info-text mb-0">sPaw@gmail.com</p>
                                    </div>
                                </div>
                                <!-- Teléfono -->
                                <div class="info-item d-flex gap-3">
                                    <i class="bi bi-telephone-fill info-icon"></i>
                                    <div>
                                        <h6 class="info-title">Teléfono</h6>
                                        <p class="info-text mb-0">+57 3485784413</p>
                                    </div>
                                </div>
                            </div>
                            <!-- Horarios -->
                            <div class="col-12 col-md-5">
                                <div class="info-item d-flex gap-3 mb-3">
                                    <i class="bi bi-clock-fill info-icon"></i>
                                    <div>
                                        <h6 class="info-title">Horarios</h6>
                                        <p class="info-text mb-0">Lun-Dom: 9:30AM - 6:30PM</p>
                                    </div>
                                </div>
                                <!-- Dirección -->
                                <div class="info-item d-flex gap-3">
                                    <i class="bi bi-geo-alt-fill info-icon"></i>
                                    <div>
                                        <h6 class="info-title">Dirección</h6>
                                        <p class="info-text mb-0">Cra 21 #112 - 36, Bogotá, Colombia</p>
                                    </div>
                                </div>
                            </div>
                            <!-- Redes -->
                            <div class="col-12 col-md-2 d-flex justify-content-center justify-content-md-end">
                                <div class="social-icons d-flex gap-3">
                                    <i class="bi bi-whatsapp"></i>
                                    <i class="bi bi-instagram"></i>
                                    <i class="bi bi-facebook"></i>
                                    <i class="bi bi-envelope-fill"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </footer>
        <div class="footer-copy text-center py-2">
            ©2025 sPaw. Todos los derechos reservados
        </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"

        crossorigin="anonymous"></script>
    <script src="../JS/registro.js"></script>    
</body>


</html>
