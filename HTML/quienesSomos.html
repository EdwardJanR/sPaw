<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../CSS/quienesSomos.css">
    <title>Footer</title>
</head>
<body>
     <footer class="footer-custom py-5">
        <div class="container">

            <div class="row align-items-center justify-content-between">

                <!-- Logo -->
                <div class="col-md-4 d-flex justify-content-center justify-content-md-start mb-4 mb-md-0">
                    <img src="../ASSETS/logo-03.png" class="footer-logo" alt="Logo sPaw">
                </div>

                <!-- Información -->
                <div class="col-md-8">
                    <div class="row g-4">

                        <!-- Correo -->
                        <div class="col-12 col-md-6">
                            <div class="info-item d-flex gap-3">
                                <i class="bi bi-envelope-fill info-icon"></i>
                                <div>
                                    <h6 class="info-title">Correo</h6>
                                    <p class="info-text mb-0">sPaw@gmail.com</p>
                                </div>
                            </div>
                        </div>

                        <!-- Horarios -->
                        <div class="col-12 col-md-6">
                            <div class="info-item d-flex gap-3">
                                <i class="bi bi-clock-fill info-icon"></i>
                                <div>
                                    <h6 class="info-title">Horarios</h6>
                                    <p class="info-text mb-0">Lun–Dom: 9:30AM – 6:30PM</p>
                                </div>
                            </div>
                        </div>

                        <!-- Teléfono -->
                        <div class="col-12 col-md-6">
                            <div class="info-item d-flex gap-3">
                                <i class="bi bi-telephone-fill info-icon"></i>
                                <div>
                                    <h6 class="info-title">Teléfono</h6>
                                    <p class="info-text mb-0">+57 3485784413</p>
                                </div>
                            </div>
                        </div>

                        <!-- Dirección -->
                        <div class="col-12 col-md-6">
                            <div class="info-item d-flex gap-3">
                                <i class="bi bi-geo-alt-fill info-icon"></i>
                                <div>
                                    <h6 class="info-title">Dirección</h6>
                                    <p class="info-text mb-0">Cra 21 #112 - 36, Bogotá, Colombia</p>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>

            </div>



        </div>
        <div class="col-md-6 d-flex justify-content-center">
                    <div class="icon-grid">
                        <i class="bi bi-whatsapp"></i>
                        <i class="bi bi-instagram"></i>
                        <i class="bi bi-facebook"></i>
                        <i class="bi bi-envelope-fill"></i>
                    </div>
                </div>
    </footer>

    <div class="footer-copy text-center py-2">
        ©2025 sPaw. Todos los derechos reservados
    </div>

    
</body>
</html>
